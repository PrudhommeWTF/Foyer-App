name: Foyer
version: "1.0.0"
slug: foyer
description: >-
  Application de gestion familiale : calendrier, courses, tâches, budget,
  repas, recettes, contacts, documents et plus — auto-hébergée.
url: https://github.com/PrudhommeWTF/Foyer-App
# Prebuilt multi-arch image published by CI. To build locally instead,
# comment out the `image:` line below (the add-on then builds ./Dockerfile).
image: ghcr.io/prudhommewtf/foyer-app
arch:
  - amd64
  - aarch64
init: false
# Home Assistant ingress: the app appears directly in the HA sidebar.
ingress: true
ingress_port: 8099
panel_icon: mdi:home-heart
panel_title: Foyer
# Also expose the port directly (optional — remove to keep it ingress-only).
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Interface web Foyer (accès direct, optionnel)
options:
  jwt_secret: ""
  admin_email: "camille.martin@email.fr"
  admin_password: "foyer"
  allow_signup: true
schema:
  jwt_secret: str?
  admin_email: str
  admin_password: str
  allow_signup: bool
