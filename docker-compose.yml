# Foyer — self-hosted, single container.
# Usage:  docker compose up -d   →   http://localhost:8099
services:
  foyer:
    build: .
    # Or use the prebuilt image published by CI:
    # image: ghcr.io/prudhommewtf/foyer-app:latest
    container_name: foyer
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - foyer-data:/data
    environment:
      # CHANGE THIS before exposing publicly!
      FOYER_JWT_SECRET: "change-me-to-a-long-random-string"
      # First launch shows the setup wizard (creates household + admin account).
      # Close registrations once your household is created:
      FOYER_ALLOW_SIGNUP: "true"
      # Set to "true" to preload the demo dataset instead of the onboarding wizard
      # (demo account camille.martin@email.fr / foyer). Leave "false" for real use.
      FOYER_SEED_DEMO: "false"
      # Only used when FOYER_SEED_DEMO is "true":
      # FOYER_ADMIN_EMAIL: "camille.martin@email.fr"
      # FOYER_ADMIN_PASSWORD: "foyer"

volumes:
  foyer-data:
